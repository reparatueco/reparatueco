<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f0f4ff">
<title>ReparaTuEco — Estado de tu orden</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg, #f0f4ff 0%, #e0f2fe 50%, #f0fdf4 100%);
    min-height: 100vh;
    color: #1e1b4b;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 24px 16px 40px; }

  /* Header */
  .header { text-align: center; margin-bottom: 28px; }
  .logo { height: 110px; width: 110px; object-fit: contain; margin-bottom: 4px; mix-blend-mode: multiply; border-radius: 50%; }
  .brand-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #4f46e5; letter-spacing: 1px; }
  .brand-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }

  /* Orden card */
  .orden-card {
    background: #fff;
    border-radius: 20px;
    padding: 24px 20px;
    box-shadow: 0 4px 24px rgba(99,102,241,0.12);
    border: 1.5px solid rgba(99,102,241,0.1);
    margin-bottom: 16px;
  }
  .orden-id { font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; color: #6366f1; letter-spacing: .5px; margin-bottom: 4px; }
  .orden-nombre { font-size: 20px; font-weight: 700; color: #1e1b4b; margin-bottom: 16px; }

  /* Estado badge */
  .estado-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px; border-radius: 999px;
    font-size: 14px; font-weight: 700;
    margin-bottom: 20px;
  }
  .estado-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

  /* Stepper */
  .stepper { display: flex; align-items: center; margin-bottom: 24px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
  .step-circle {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700;
    transition: all .3s;
  }
  .step-circle.done { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; box-shadow: 0 4px 12px rgba(22,163,74,0.3); }
  .step-circle.active { background: linear-gradient(135deg, #4f46e5, #818cf8); color: #fff; box-shadow: 0 4px 12px rgba(79,70,229,0.3); animation: pulse 2s infinite; }
  .step-circle.pending { background: #f1f5f9; color: #94a3b8; border: 2px solid #e2e8f0; }
  @keyframes pulse { 0%,100%{box-shadow:0 4px 12px rgba(79,70,229,0.3)} 50%{box-shadow:0 4px 20px rgba(79,70,229,0.5)} }
  .step-label { font-size: 10px; font-weight: 600; color: #94a3b8; text-align: center; white-space: nowrap; }
  .step-label.active { color: #4f46e5; }
  .step-label.done { color: #16a34a; }
  .step-line { flex: 1; height: 2px; margin-bottom: 20px; border-radius: 2px; }
  .step-line.done { background: linear-gradient(90deg, #16a34a, #22c55e); }
  .step-line.pending { background: #e2e8f0; }

  /* Info rows */
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: #94a3b8; font-weight: 500; }
  .info-val { font-weight: 600; color: #1e1b4b; text-align: right; }

  /* Mensaje estado */
  .estado-msg {
    border-radius: 14px; padding: 16px 18px;
    font-size: 13px; line-height: 1.7;
    margin-bottom: 16px;
  }

  /* Fotos */
  .fotos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 10px; }
  .foto { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; cursor: pointer; border: 1.5px solid rgba(99,102,241,0.1); }

  /* Redes sociales */
  .social-section { text-align: center; margin-top: 24px; }
  .social-title { font-size: 13px; color: #94a3b8; font-weight: 600; margin-bottom: 14px; letter-spacing: .5px; }
  .social-links { display: flex; justify-content: center; gap: 16px; }
  .social-btn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    text-decoration: none; color: #fff;
    width: 64px; height: 64px; border-radius: 16px;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    transition: transform .2s, box-shadow .2s;
  }
  .social-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
  .social-btn span { font-size: 10px; font-weight: 700; letter-spacing: .3px; }
  .btn-tiktok { background: linear-gradient(135deg, #010101, #333); }
  .btn-instagram { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }
  .btn-facebook { background: linear-gradient(135deg, #1877f2, #42a5f5); }

  /* Footer */
  .footer { text-align: center; margin-top: 28px; font-size: 11px; color: #94a3b8; }

  /* Loading / Error */
  .loading-state, .error-state {
    text-align: center; padding: 60px 20px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 4px 24px rgba(99,102,241,0.12);
  }
  .loading-state { color: #6366f1; }
  .spinner { width: 36px; height: 36px; border: 3px solid #e0e7ff; border-top-color: #4f46e5; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .card-section { margin-bottom: 16px; }
  .card-section-title { font-size: 11px; font-weight: 700; color: #6366f1; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
</style>
</head>

      <a href="https://www.instagram.com/repara_tu_eco?igsh=MTZnamRpZ2lnamE0NQ==" target="_blank" class="social-btn btn-instagram">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="white" stroke-width="2" fill="none"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z" stroke="white" stroke-width="2" fill="none"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
        <span>Instagram</span>
      </a>
      <a href="https://www.facebook.com/share/1CKdARzHKB/" target="_blank" class="social-btn btn-facebook">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
        <span>Facebook</span>
      </a>
    </div>
  </div>

  <div class="footer">
    © 2025 ReparaTuEco · Todos los derechos reservados
  </div>
</div>

<script>
const SUPA_URL = 'https://hetnortmjclryromohpq.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhldG5vcnRtamNscnlyb21vaHBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNDgzMzUsImV4cCI6MjA4OTYyNDMzNX0.wqI9apG-MNM2l_7biuRqrTMzVh5LzdDALy7mF-H7lj0';

const ESTADOS = {
  pendiente:      { label: 'Recibido',       emoji: '📋', color: '#d97706', bg: '#fffbeb', step: 1 },
  en_proceso:     { label: 'En revisión',    emoji: '🔧', color: '#2563eb', bg: '#eff6ff', step: 2 },
  pendiente_admin:{ label: 'Por aprobar',    emoji: '🔍', color: '#ea580c', bg: '#fff7ed', step: 2 },
  listo:          { label: 'Listo para recoger', emoji: '✅', color: '#16a34a', bg: '#f0fdf4', step: 3 },
  entregada:      { label: 'Entregado',      emoji: '🎉', color: '#6366f1', bg: '#eef2ff', step: 4 },
};

const PASOS = [
  { label: 'Recibido',    emoji: '📋' },
  { label: 'En revisión', emoji: '🔧' },
  { label: 'Listo',       emoji: '✅' },
  { label: 'Entregado',   emoji: '🎉' },
];

const MENSAJES = {
  pendiente:       '📋 Tu vehículo eléctrico ha sido recibido en nuestro taller. Pronto comenzaremos la revisión. Te avisaremos cuando esté en proceso.',
  en_proceso:      '🔧 Nuestro técnico está trabajando en tu vehículo eléctrico. Te notificaremos cuando esté listo.',
  pendiente_admin: '🔍 El técnico terminó la revisión. Estamos verificando el trabajo antes de notificarte. ¡Ya casi está!',
  listo:           '✅ ¡Tu vehículo eléctrico ya está listo para recoger! Puedes pasar a nuestro taller dentro del horario de atención.',
  entregada:       '🎉 ¡Gracias por confiar en ReparaTuEco! Tu vehículo fue entregado. ¡Hasta la próxima!',
};

function formatFecha(iso) {
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-CO', { day:'2-digit', month:'long', year:'numeric' }) +
    ' · ' + d.toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' });
}

function renderStepper(estadoActual) {
  const info = ESTADOS[estadoActual] || ESTADOS.pendiente;
  const currentStep = info.step;
  let html = '<div class="stepper">';
  PASOS.forEach((p, i) => {
    const stepNum = i + 1;
    const isDone = stepNum < currentStep;
    const isActive = stepNum === currentStep;
    const cls = isDone ? 'done' : isActive ? 'active' : 'pending';
    html += `<div class="step">
      <div class="step-circle ${cls}">${isDone ? '✓' : p.emoji}</div>
      <div class="step-label ${cls}">${p.label}</div>
    </div>`;
    if(i < PASOS.length - 1) {
      html += `<div class="step-line ${isDone ? 'done' : 'pending'}"></div>`;
    }
  });
  html += '</div>';
  return html;
}

function mostrarBuscador() {
  document.getElementById('contenido').innerHTML = `
    <div class="orden-card">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:40px;margin-bottom:10px;">🔍</div>
        <div style="font-size:17px;font-weight:700;color:#1e1b4b;margin-bottom:6px;">Consulta el estado de tu orden</div>
        <div style="font-size:13px;color:#94a3b8;">Escribe tu número de orden para ver el estado de tu vehículo</div>
      </div>
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:12px;font-weight:700;color:#6366f1;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Número de orden</label>
        <input id="buscar-orden-input" type="text" placeholder="Ej: ORD-051"
          style="width:100%;background:#f8fafc;border:1.5px solid rgba(99,102,241,0.25);border-radius:12px;color:#1e1b4b;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;padding:14px 16px;outline:none;letter-spacing:.5px;text-transform:uppercase;box-sizing:border-box;"
          onfocus="this.style.borderColor='#4f46e5';this.style.background='#fff'"
          onblur="this.style.borderColor='rgba(99,102,241,0.25)';this.style.background='#f8fafc'"
          onkeydown="if(event.key==='Enter')buscarOrden()">
      </div>
      <button onclick="buscarOrden()" style="width:100%;background:linear-gradient(135deg,#4f46e5,#818cf8);color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(99,102,241,0.3);">
        🔍 Consultar estado
      </button>
    </div>`;
  setTimeout(() => document.getElementById('buscar-orden-input')?.focus(), 150);
}

function buscarOrden() {
  const inp = document.getElementById('buscar-orden-input');
  const val = inp?.value.trim().toUpperCase();
  if(!val) { if(inp) inp.style.borderColor='#dc2626'; return; }
  cargarOrden(val);
}

async function cargarOrden(ordenIdParam) {
  const params = new URLSearchParams(window.location.search);
  const ordenId = ordenIdParam || params.get('orden');

  if(!ordenId) {
    mostrarBuscador();
    return;
  }

  document.getElementById('contenido').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div style="font-size:15px;font-weight:600;">Buscando tu orden...</div>
      <div style="font-size:12px;color:#94a3b8;margin-top:6px;">Un momento por favor</div>
    </div>`;

  try {
    // Limpiar el ID — quitar espacios, convertir a mayúsculas
    const idLimpio = ordenId.trim().toUpperCase();
    
    const resp = await fetch(SUPA_URL + '/rest/v1/ordenes?id=eq.' + encodeURIComponent(idLimpio) + '&select=id,nombre,servicio,estado,fecha,marca,referencia,color_vehiculo,tecnico,fotos_proceso,fotos_ingreso,diagnostico,repuestos,presupuesto', {
      headers: { 
        'apikey': SUPA_KEY, 
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json'
      }
    });
    
    if(!resp.ok) {
      throw new Error('Error del servidor: ' + resp.status);
    }
    
    const rows = await resp.json();
    const o = rows[0];

    if(!o) {
      document.getElementById('contenido').innerHTML = `
        <div class="error-state">
          <div style="font-size:48px;margin-bottom:12px;">😕</div>
          <div style="font-size:16px;font-weight:700;margin-bottom:8px;">No encontramos la orden "${ordenId}"</div>
          <div style="font-size:13px;color:#94a3b8;margin-bottom:20px;">Verifica el número de orden o contacta al taller.</div>
          <button onclick="mostrarBuscador()" style="background:linear-gradient(135deg,#4f46e5,#818cf8);color:#fff;border:none;border-radius:12px;padding:12px 24px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">← Buscar otra orden</button>
        </div>`;
      return;
    }

    const info = ESTADOS[o.estado] || ESTADOS.pendiente;
    const fotosIngreso = o.fotos_ingreso || [];
    const fotosProceso = o.fotos_proceso || [];
    const vehiculo = [o.marca, o.referencia, o.color_vehiculo].filter(Boolean).join(' · ');

    // Repuestos (excluir servicios extra)
    const repuestos = (o.repuestos || []).filter(r => !r._tipo && r.nombre);
    const totalRepuestos = repuestos.reduce((s, r) => s + Number(r.precio || 0), 0);
    const presupuesto = Number(o.presupuesto || 0);
    const totalPagar = totalRepuestos + presupuesto;

    // Sección fotos de ingreso (estado pendiente)
    const fotosIngresoHTML = (o.estado === 'pendiente' || o.estado === 'en_proceso' || o.estado === 'pendiente_admin') && fotosIngreso.length ? `
    <div class="card-section">
      <div class="card-section-title">📷 Foto de recibido</div>
      <div class="fotos-grid">
        ${fotosIngreso.map(u => `<img class="foto" src="${u}" onclick="window.open('${u}','_blank')" loading="lazy">`).join('')}
      </div>
    </div>` : '';

    // Sección cobro (estado listo o entregada)
    const mostrarCobro = o.estado === 'listo' || o.estado === 'entregada';
    const cobroHTML = mostrarCobro ? `
    <div class="card-section" style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid rgba(22,163,74,0.2);border-radius:14px;padding:16px;">
      <div class="card-section-title" style="color:#15803d;">💰 Detalle del cobro</div>
      ${repuestos.length ? repuestos.map(r => `
        <div class="info-row" style="border-color:rgba(22,163,74,0.15);">
          <span class="info-label">${r.nombre}</span>
          <span class="info-val" style="color:#16a34a;font-family:Arial,sans-serif;">$${Number(r.precio||0).toLocaleString('es-CO')}</span>
        </div>`).join('') : '<div style="font-size:12px;color:#94a3b8;padding:4px 0;">Sin repuestos adicionales</div>'}
      ${presupuesto > 0 ? `
        <div class="info-row" style="border-color:rgba(22,163,74,0.15);">
          <span class="info-label">Servicio</span>
          <span class="info-val" style="color:#16a34a;font-family:Arial,sans-serif;">$${presupuesto.toLocaleString('es-CO')}</span>
        </div>` : ''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:2px solid rgba(22,163,74,0.2);">
        <span style="font-size:14px;font-weight:700;color:#15803d;">Total a pagar</span>
        <span style="font-family:Arial,sans-serif;font-size:20px;font-weight:800;color:#15803d;">$${totalPagar.toLocaleString('es-CO')}</span>
      </div>
    </div>` : '';

    // Diagnóstico (estado listo o entregada)
    const diagHTML = mostrarCobro && o.diagnostico ? `
    <div class="card-section" style="background:#f8fafc;border:1.5px solid rgba(99,102,241,0.12);border-radius:14px;padding:16px;">
      <div class="card-section-title">🔧 Diagnóstico del técnico</div>
      <div style="font-size:13px;color:#1e1b4b;line-height:1.7;">${o.diagnostico}</div>
    </div>` : '';

    // Fotos del proceso
    const fotosProcesoHTML = fotosProceso.length ? `
    <div class="card-section">
      <div class="card-section-title">📷 Fotos del proceso</div>
      <div class="fotos-grid">
        ${fotosProceso.map(u => `<img class="foto" src="${u}" onclick="window.open('${u}','_blank')" loading="lazy">`).join('')}
      </div>
    </div>` : '';

    let html = `
      <div class="orden-card">
        <div class="orden-id">${o.id}</div>
        <div class="orden-nombre">${o.nombre}</div>

        <!-- Badge estado -->
        <div class="estado-badge" style="background:${info.bg};color:${info.color};">
          <div class="estado-dot"></div>
          ${info.emoji} ${info.label}
        </div>

        <!-- Stepper -->
        ${renderStepper(o.estado)}

        <!-- Info -->
        <div class="card-section">
          <div class="info-row">
            <span class="info-label">Servicio</span>
            <span class="info-val">${o.servicio||'—'}</span>
          </div>
          ${vehiculo ? `<div class="info-row"><span class="info-label">Vehículo</span><span class="info-val">${vehiculo}</span></div>` : ''}
          ${o.tecnico ? `<div class="info-row"><span class="info-label">Técnico</span><span class="info-val">👨‍🔧 ${o.tecnico}</span></div>` : ''}
          <div class="info-row">
            <span class="info-label">Ingreso</span>
            <span class="info-val">${formatFecha(o.fecha)}</span>
          </div>
        </div>

        <!-- Mensaje del estado -->
        <div class="estado-msg" style="background:${info.bg};border:1.5px solid ${info.color}30;color:${info.color};">
          ${MENSAJES[o.estado] || MENSAJES.pendiente}
        </div>

        <!-- Foto de recibido -->
        ${fotosIngresoHTML}

        <!-- Cobro (cuando está listo) -->
        ${cobroHTML}

        <!-- Diagnóstico -->
        ${diagHTML}

        <!-- Fotos del proceso -->
        ${fotosProcesoHTML}

        <button onclick="mostrarBuscador()" style="width:100%;margin-top:8px;background:none;border:1.5px solid rgba(99,102,241,0.2);border-radius:12px;padding:11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;color:#6366f1;cursor:pointer;">← Consultar otra orden</button>
      </div>`;

    document.getElementById('contenido').innerHTML = html;

  } catch(e) {
    document.getElementById('contenido').innerHTML = `
      <div class="error-state">
        <div style="font-size:48px;margin-bottom:12px;">⚠️</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:8px;">Error de conexión</div>
        <div style="font-size:13px;color:#94a3b8;margin-bottom:6px;">No pudimos cargar tu orden. Intenta de nuevo.</div>
        <div style="font-size:11px;color:#dc2626;margin-bottom:20px;">${e.message}</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          <button onclick="cargarOrden('${ordenId}')" style="background:linear-gradient(135deg,#4f46e5,#818cf8);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">Reintentar</button>
          <button onclick="mostrarBuscador()" style="background:none;border:1.5px solid rgba(99,102,241,0.3);border-radius:12px;padding:12px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:#6366f1;cursor:pointer;">← Buscar otra</button>
        </div>
      </div>`;
  }
}

cargarOrden();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estado de tu bicicleta — ReparaTuEco</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#00e676;--green-dim:rgba(0,230,118,0.12);--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0f0;--text2:#888;--text3:#555;--amber:#ffb300;--blue:#2979ff;--radius:14px;--radius-sm:8px;--mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.5;}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:var(--mono);font-size:14px;color:var(--green);letter-spacing:2px;}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.container{max-width:460px;margin:0 auto;padding:20px 16px 60px;}
.search-wrap{margin-top:32px;}
.search-title{font-size:18px;font-weight:600;margin-bottom:6px;}
.search-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.search-row{display:flex;gap:10px;}
.search-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--sans);font-size:15px;padding:12px 16px;outline:none;transition:border-color .15s;}
.search-row input:focus{border-color:var(--green);}
.search-row button{background:var(--green);color:#000;border:none;border-radius:var(--radius-sm);padding:12px 20px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;}
.orden-header{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;}
.orden-num{font-family:var(--mono);font-size:13px;color:var(--green);margin-bottom:4px;}
.orden-nombre{font-size:19px;font-weight:700;margin-bottom:2px;}
.orden-serv{font-size:13px;color:var(--text2);}
.timeline{display:flex;flex-direction:column;gap:0;margin-bottom:20px;}
.tl-item{display:flex;gap:14px;position:relative;}
.tl-item:not(:last-child)::after{content:'';position:absolute;left:17px;top:38px;bottom:-2px;width:2px;background:var(--border);}
.tl-item.done::after{background:var(--green);}
.tl-item.active::after{background:var(--green);}
.tl-dot{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.tl-item.done .tl-dot{background:var(--green);border-color:var(--green);}
.tl-item.active .tl-dot{background:var(--green-dim);border-color:var(--green);animation:pulse 2s infinite;}
.tl-body{padding:2px 0 24px;flex:1;}
.tl-title{font-size:15px;font-weight:600;margin-bottom:3px;}
.tl-item.pending .tl-title{color:var(--text3);}
.tl-sub{font-size:12px;color:var(--text2);margin-bottom:6px;}
.foto-ingreso{width:100%;border-radius:12px;object-fit:cover;max-height:200px;border:1px solid var(--border);margin-top:10px;cursor:pointer;display:block;}
.fotos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;}
.fotos-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid var(--border);cursor:pointer;}
.fotos-grid.una img{grid-column:1/-1;aspect-ratio:16/9;}
.total-card{background:var(--green-dim);border:1px solid rgba(0,230,118,0.25);border-radius:var(--radius-sm);padding:14px 16px;margin-top:12px;display:flex;justify-content:space-between;align-items:center;}
.total-label{font-size:13px;font-weight:600;color:var(--green);}
.total-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--green);}
.lista-banner{background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.25);border-radius:var(--radius);padding:22px;text-align:center;margin-bottom:16px;}
.lista-emoji{font-size:44px;margin-bottom:8px;}
.lista-title{font-size:18px;font-weight:700;color:var(--green);margin-bottom:4px;}
.lista-sub{font-size:13px;color:var(--text2);}
.loading{text-align:center;padding:50px 20px;color:var(--text3);}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0.4)}50%{box-shadow:0 0 0 8px rgba(0,230,118,0)}}
.refresh-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:11px;padding:4px 10px;cursor:pointer;font-family:var(--sans);}
.btn-otra{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--sans);margin-top:16px;display:block;width:100%;text-align:center;padding:8px;}
.detalle-box{margin-top:10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
.detalle-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);}
.detalle-row:last-child{border-bottom:none;}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">ReparaTuEco</div>
    <div class="logo-sub">Estado de tu bicicleta</div>
  </div>
  <button class="refresh-btn" onclick="if(ordenActual)mostrarOrden(ordenActual)">↻ Actualizar</button>
</div>

<div class="container">
  <div id="search-section" class="search-wrap">
    <div class="search-title">¿Cómo va tu bicicleta?</div>
    <div class="search-sub">Ingresa el número de orden que recibiste por WhatsApp</div>
    <div class="search-row">
      <input type="text" id="buscar-orden" placeholder="Ej: ORD-001" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')buscarOrden()">
      <button onclick="buscarOrden()">Ver</button>
    </div>
  </div>
  <div id="contenido"></div>
</div>

<script>
const SUPA_URL='https://hetnortmjclryromohpq.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhldG5vcnRtamNscnlyb21vaHBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNDgzMzUsImV4cCI6MjA4OTYyNDMzNX0.wqI9apG-MNM2l_7biuRqrTMzVh5LzdDALy7mF-H7lj0';
let ordenActual=null, timer=null;

function buscarOrden(){
  const id=document.getElementById('buscar-orden').value.trim();
  if(!id) return;
  ordenActual=id;
  mostrarOrden(id);
}

function mostrarOrden(id){
  document.getElementById('contenido').innerHTML='<div class="loading"><div class="spinner"></div>Buscando tu bicicleta...</div>';
  fetch(SUPA_URL+'/rest/v1/ordenes?id=eq.'+encodeURIComponent(id)+'&select=id,nombre,servicio,estado,fecha,marca,color_vehiculo,fotos_ingreso,fotos_proceso,repuestos,tecnico,presupuesto,diagnostico',{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
  }).then(r=>r.json()).then(rows=>{
    if(!rows||!rows.length){
      document.getElementById('contenido').innerHTML=`<div class="loading"><div style="font-size:36px;margin-bottom:12px;">🔍</div><div style="font-size:15px;color:var(--text2);">No encontramos la orden <strong style="color:var(--text)">${id}</strong></div><div style="font-size:12px;color:var(--text3);margin-top:6px;">Verifica el número e intenta de nuevo</div><button class="btn-otra" onclick="volverBuscar()">Intentar de nuevo</button></div>`;
      return;
    }
    renderOrden(rows[0]);
    clearTimeout(timer);
    if(rows[0].estado==='en_proceso') timer=setTimeout(()=>mostrarOrden(id),30000);
  }).catch(()=>{
    document.getElementById('contenido').innerHTML='<div class="loading" style="color:var(--text2)">Error de conexión. Verifica tu internet.</div>';
  });
}

function volverBuscar(){
  ordenActual=null;
  clearTimeout(timer);
  document.getElementById('search-section').style.display='';
  document.getElementById('contenido').innerHTML='';
  document.getElementById('buscar-orden').value='';
}

function renderOrden(o){
  document.getElementById('search-section').style.display='none';
  const est=o.estado;
  const fi=o.fotos_ingreso||[];
  const fp=o.fotos_proceso||[];
  const todasFotos=[...fi,...fp];
  const reps=o.repuestos||[];
  const totalReps=reps.reduce((s,r)=>s+Number(r.precio||0),0);
  const totalServ=Number(o.presupuesto||0);
  const total=totalReps+totalServ;

  const chk=(key)=>key==='done'?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`:'·';

  const isDone=(e)=>({pendiente:['pendiente','en_proceso','listo','pendiente_admin','entregada'],en_proceso:['en_proceso','listo','pendiente_admin','entregada'],listo:['listo','pendiente_admin','entregada'],entregada:['entregada']}[e]||[]).includes(est);
  const isActive=(e)=>est===e;

  // Fotos de ingreso - mostrar todas
  const fotoIngresoHTML = fi.length ? `
    <div class="fotos-grid ${fi.length===1?'una':''}">
      ${fi.map(f=>`<img src="${f}" onclick="window.open('${f}','_blank')" alt="Foto ingreso">`).join('')}
    </div>` : '';

  // Fotos, diagnostico, repuestos y total (solo cuando lista/entregada)
  const fotosFinalesHTML = ['listo','pendiente_admin','entregada'].includes(est) ? `
    ${fp.length ? `<div class="fotos-grid ${fp.length===1?'una':''}">
      ${fp.map(f=>`<img src="${f}" onclick="window.open('${f}','_blank')" alt="foto">`).join('')}
    </div>` : ''}
    ${total>0?`<div class="total-card"><span class="total-label">Total del servicio</span><span class="total-val">$${total.toLocaleString('es-CO')}</span></div>`:''}
    ${o.diagnostico?`<div class="detalle-box" style="margin-top:10px;">
      <div style="font-size:10px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">Diagnóstico del técnico</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.7;">${o.diagnostico}</div>
    </div>`:''}
    ${reps.length||o.presupuesto?`<div class="detalle-box">
      <div style="font-size:10px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">Repuestos utilizados</div>
      ${o.presupuesto?`<div class="detalle-row"><span>Servicio</span><span style="font-family:var(--mono);">$${Number(o.presupuesto).toLocaleString('es-CO')}</span></div>`:''}
      ${reps.map(r=>`<div class="detalle-row"><span>${r.nombre||'-'}</span><span style="font-family:var(--mono);color:var(--green);">${r.precio?'$'+Number(r.precio).toLocaleString('es-CO'):'Sin precio'}</span></div>`).join('')}
      ${reps.length?`<div class="detalle-row" style="border-top:1px solid var(--border2);margin-top:4px;"><span style="font-weight:600;">Total repuestos</span><span style="font-family:var(--mono);font-weight:700;color:var(--green);">$${totalReps.toLocaleString('es-CO')}</span></div>`:''}
    </div>`:''}` : '';

  const banner = ['listo','pendiente_admin','entregada'].includes(est) ? `
  <div class="lista-banner">
    <div class="lista-emoji">${est==='entregada'?'🎉':'🚲'}</div>
    <div class="lista-title">${est==='entregada'?'¡Ya fue entregada!':'¡Tu bicicleta está lista!'}</div>
    <div class="lista-sub">${est==='entregada'?'Gracias por confiar en nosotros 🙌':'Puedes pasar a recogerla cuando quieras'}</div>
  </div>` : '';

  const fotosProcesoHTML = fp.length ? `
    <div class="fotos-grid ${fp.length===1?'una':''}">
      ${fp.map(f=>`<img src="${f}" onclick="window.open('${f}','_blank')" alt="Foto proceso">`).join('')}
    </div>` : '';

  const steps = [
    {key:'pendiente', title:'Bicicleta recibida', sub:'Tu bicicleta ingresó al taller el ' + (o.fecha ? new Date(o.fecha).toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'}) : ''), extra: fotoIngresoHTML},
    {key:'en_proceso', title:'En reparación', sub: o.tecnico?'Con el técnico '+o.tecnico:'Siendo revisada por nuestro equipo', extra:''},
    {key:'listo', title:'Lista para entrega', sub:'Revisión completada — puedes pasar', extra: fotosFinalesHTML},
    {key:'entregada', title:'Entregada', sub:'¡Gracias por confiar en ReparaTuEco!', extra:''},
  ];

  const tlHTML = steps.map(s=>{
    const done=isDone(s.key);
    const active=isActive(s.key);
    const cls=done?'done':active?'active':'pending';
    return `<div class="tl-item ${cls}">
      <div class="tl-dot">${done?chk('done'):'<span style="font-size:12px;color:var(--text3)">○</span>'}</div>
      <div class="tl-body">
        <div class="tl-title">${s.title}</div>
        ${done||active?`<div class="tl-sub">${s.sub}</div>`:''}
        ${done||active?s.extra:''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('contenido').innerHTML=`
  <div>
    ${banner}
    <div class="orden-header">
      <div class="orden-num">${o.id}</div>
      <div class="orden-nombre">${o.nombre}</div>
      <div class="orden-serv">${o.servicio}${o.marca?' · '+o.marca:''}${o.color_vehiculo?' · '+o.color_vehiculo:''}</div>
    </div>
    <div class="timeline">${tlHTML}</div>
    <button class="btn-otra" onclick="volverBuscar()">Consultar otra orden</button>
  </div>`;
}

window.addEventListener('DOMContentLoaded',()=>{
  const p=new URLSearchParams(window.location.search);
  const ord=p.get('orden');
  if(ord){ordenActual=ord;document.getElementById('buscar-orden').value=ord;mostrarOrden(ord);}
});
</script>
</body>
</html>
